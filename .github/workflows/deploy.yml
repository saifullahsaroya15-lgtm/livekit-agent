name: Build and Push Docker Image to AWS ECR

on:
  push:
    branches:
      - main
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  AWS_REGION: us-east-1                  # Set to the AWS region where your ECR repository is located
  ECR_REPOSITORY: livekit-agent-repo     # Set to your Amazon ECR repository name

jobs:
  build-and-push:
    name: Build, Test, and Push
    runs-on: ubuntu-latest

    # Recommended permissions for AWS OIDC authentication (optional but more secure than access keys)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # STEP 1: Configure AWS Credentials
      # ---------------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # --- OPTION 1: IAM User Security Credentials (Standard) ---
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          
          # --- OPTION 2: OIDC Role Assumption (Recommended for Security) ---
          # role-to-assume: arn:aws:iam::123456789012:role/my-github-actions-role

      # ---------------------------------------------------------
      # STEP 2: Login to Amazon ECR
      # ---------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------------
      # STEP 3: Ensure dependencies and tests pass (Optional)
      # ---------------------------------------------------------
      # Example for Node/Python/Go tests:
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - name: Install Dependencies
      #   run: npm install
      # - name: Run Tests
      #   run: npm test

      # ---------------------------------------------------------
      # STEP 4: Build, Tag, and Push the Docker Image
      # ---------------------------------------------------------
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS, EKS, or EC2.
          
          echo "Building Docker Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          echo "Pushing Specific Tag to ECR"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          echo "Pushing Latest Tag to ECR"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "IMAGE $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG successfully pushed to ECR."
